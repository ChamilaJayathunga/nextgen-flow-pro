services:
  - type: web
    name: nextgen-flow-pro-backend
    env: node
    plan: free
    region: oregon
    branch: master
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push && npm run prisma:seed && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: nextgen-flow-pro-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://chamilajayathunga.github.io
      - key: RATE_LIMIT_WINDOW
        value: "15"
      - key: RATE_LIMIT_MAX
        value: "100"
      - key: UPLOAD_DIR
        value: uploads
      - key: LOG_LEVEL
        value: info

databases:
  - name: nextgen-flow-pro-db
    plan: free
    region: oregon
    databaseName: nextgen_flow_pro
    user: nextgen
