version: "3.9"

networks:
  nextgen-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

services:
  postgres:
    image: postgres:16-alpine
    container_name: nextgen-postgres
    restart: unless-stopped
    networks:
      - nextgen-network
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-nextgen_flow_pro}
      POSTGRES_USER: ${DB_USER:-nextgen}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nextgen_secret}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nextgen} -d ${DB_NAME:-nextgen_flow_pro}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: nextgen-redis
    restart: unless-stopped
    networks:
      - nextgen-network
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: nextgen-backend
    restart: unless-stopped
    networks:
      - nextgen-network
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      PORT: 4000
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      DATABASE_URL: postgresql://${DB_USER:-nextgen}:${DB_PASSWORD:-nextgen_secret}@postgres:5432/${DB_NAME:-nextgen_flow_pro}
      REDIS_URL: redis://redis:6379
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: nextgen-frontend
    restart: unless-stopped
    networks:
      - nextgen-network
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
